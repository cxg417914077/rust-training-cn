# GitHub Actions workflow to build and deploy mdBook sites to GitHub Pages
name: Deploy mdBook sites to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        book:
          - python-book
          - async-book
          - rust-patterns-book
          - type-driven-correctness-book
          - engineering-book
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          cargo install mdbook
          cargo install mdbook-mermaid

      - name: Build ${{ matrix.book }}
        run: |
          cd ${{ matrix.book }}
          mdbook build

      - name: Upload book artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ matrix.book }}
          path: ${{ matrix.book }}/book/
          retention-days: 1
          if-no-files-found: error

  # Merge all book artifacts into one directory
  merge-artifacts:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create site directory
        run: mkdir -p site

      - name: Download python-book
        uses: actions/download-artifact@v4
        with:
          name: site-python-book
          path: site/python-book

      - name: Download async-book
        uses: actions/download-artifact@v4
        with:
          name: site-async-book
          path: site/async-book

      - name: Download rust-patterns-book
        uses: actions/download-artifact@v4
        with:
          name: site-rust-patterns-book
          path: site/rust-patterns-book

      - name: Download type-driven-correctness-book
        uses: actions/download-artifact@v4
        with:
          name: site-type-driven-correctness-book
          path: site/type-driven-correctness-book

      - name: Download engineering-book
        uses: actions/download-artifact@v4
        with:
          name: site-engineering-book
          path: site/engineering-book

      - name: Create .nojekyll file
        run: touch site/.nojekyll

      - name: List site contents
        run: ls -la site/

      - name: Upload merged site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: merge-artifacts
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
