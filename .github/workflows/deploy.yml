# GitHub Actions workflow to build and deploy mdBook sites to GitHub Pages
name: Deploy mdBook sites to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        book:
          - python-book
          - async-book
          - rust-patterns-book
          - type-driven-correctness-book
          - engineering-book
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          cargo install mdbook
          cargo install mdbook-mermaid

      - name: Build ${{ matrix.book }}
        run: |
          cd ${{ matrix.book }}
          mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ matrix.book }}/book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
